# Local API Server config for testing with DevNet Canton and Sepolia
server:
  host: "0.0.0.0"
  port: 8081
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

database:
  url: "${API_SERVER_DATABASE_URL}"
  ssl_mode: "disable"
  timeout: 10
  pool_size: 20

canton:
  domain_id: "global-domain::1220be58c29e65de40bf273be1dc2b266d43a9a002ea5b18955aeef7aac881bb471a"
  issuer_party: "daml-autopilot::1220096316d4ea75c021d89123cfd2792cfeac80dfbf90bfbca21bcd8bf1bb40d84c"

  ledger:
    rpc_url: "canton-ledger-api-grpc-dev1.chainsafe.dev:80"
    ledger_id: ""
    max_inbound_message_size: 52428800
    tls:
      enabled: false
      cert_file: ""
      key_file: ""
      ca_file: ""
      insecure_skip_verify: false
    auth:
      client_id: "${CANTON_AUTH_CLIENT_ID}"
      client_secret: "${CANTON_AUTH_CLIENT_SECRET}"
      audience: "https://canton-ledger-api-dev1.01.chainsafe.dev"
      token_url: "https://dev-2j3m40ajwym1zzaq.eu.auth0.com/oauth/token"
      expiry_leeway: "60s"

  # Package-name references (#<name>) so filters match across all deployed
  # versions and work on real chains. Canton 3.x rejects raw package hashes
  # in stream filters with INVALID_FIELD; package names are the canonical form.
  identity:
    package_id: "#common"

  token:
    cip56_package_id: "#cip56-token"
    splice_transfer_package_id: "#splice-api-token-transfer-instruction-v1"
    splice_holding_package_id: "#splice-api-token-holding-v1"
    external_tokens:
      "${CANTON_USDCX_ISSUER_PARTY}":
        registry_url: "${CANTON_USDCX_REGISTRY_URL}"

  bridge:
    package_id: "#bridge-wayfinder"
    core_package_id: "#bridge-core"
    module: "Wayfinder.Bridge"

token_provider:
  mode: indexer
  indexer:
    url: "${INDEXER_URL}"
    instruments:
      PROMPT: "daml-autopilot::1220096316d4ea75c021d89123cfd2792cfeac80dfbf90bfbca21bcd8bf1bb40d84c"
      DEMO:   "daml-autopilot::1220096316d4ea75c021d89123cfd2792cfeac80dfbf90bfbca21bcd8bf1bb40d84c"
      USDCx:  "${CANTON_USDCX_ISSUER_PARTY}"

token:
  supported_tokens:
    "0x90cb4f9eF6d682F4338f0E360B9C079fbb32048e":
      name: "PROMPT"
      symbol: "PROMPT"
      decimals: 18
      instrument_id: "PROMPT"
    "0xDE30000000000000000000000000000000000001":
      name: "Demo Token"
      symbol: "DEMO"
      decimals: 18
      instrument_id: "DEMO"
    "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48":
      name: "USD Coin"
      symbol: "USDCx"
      decimals: 6
      instrument_id: "USDCx"
  native_balance_wei: "1000000000000000000000"

# Ethereum JSON-RPC facade (MetaMask compatibility)
eth_rpc:
  enabled: true
  chain_id: 1155111101  # Custom: Sepolia (11155111) + 01 suffix for Canton local
  gas_price_wei: "1000000000"
  gas_limit: 21000
  native_balance_wei: "1000000000000000000000"
  request_timeout: "30s"

jwks:
  url: ""
  issuer: ""

reconciliation:
  initial_timeout: "2m"
  interval: "1m"

logging:
  level: "debug"
  format: "console"
  output_path: "stdout"

key_management:
  master_key_env: "CANTON_MASTER_KEY"
  key_derivation: "generate"

skip_whitelist_check: true

cors:
  - "*"
