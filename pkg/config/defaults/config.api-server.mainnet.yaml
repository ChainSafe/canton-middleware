server:
  host: "0.0.0.0"
  port: 8081
  read_timeout: "60s"
  write_timeout: "60s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

database:
  url: "${API_SERVER_DATABASE_URL}"
  ssl_mode: "require"
  timeout: 10
  pool_size: 30

canton:
  domain_id: "${CANTON_DOMAIN_ID}"
  issuer_party: "${CANTON_ISSUER_PARTY}"

  ledger:
    rpc_url: "${CANTON_LEDGER_RPC_URL}"
    ledger_id: ""
    max_inbound_message_size: 52428800
    tls:
      enabled: true
      cert_file: ""
      key_file: ""
      ca_file: ""
      insecure_skip_verify: false
    auth:
      client_id: "${CANTON_AUTH_CLIENT_ID}"
      client_secret: "${CANTON_AUTH_CLIENT_SECRET}"
      audience: "${CANTON_AUTH_AUDIENCE}"
      token_url: "${CANTON_AUTH_TOKEN_URL}"
      expiry_leeway: "60s"

  identity:
    package_id: "${CANTON_IDENTITY_PACKAGE_ID}"

  token:
    cip56_package_id: "${CANTON_CIP56_PACKAGE_ID}"
    splice_transfer_package_id: "${CANTON_SPLICE_TRANSFER_PACKAGE_ID}"
    splice_holding_package_id: "${CANTON_SPLICE_HOLDING_PACKAGE_ID}"

  bridge:
    package_id: "${CANTON_BRIDGE_PACKAGE_ID}"
    core_package_id: "${CANTON_BRIDGE_CORE_PACKAGE_ID}"
    module: "Wayfinder.Bridge"

token:
  supported_tokens:
    # Display-only synthetic addresses for MetaMask. The api-server's
    # eth_call balanceOf facade keys balances by these addresses. They must
    # NOT collide with well-known mainnet token contracts (e.g. real USDC,
    # USDT, etc.) or MetaMask flags imports as suspected phishing.
    "0x9907000000000000000000000000000000000001":
      name: "PROMPT"
      symbol: "PROMPT"
      decimals: 18
      instrument_id: "PROMPT"
    "0xDE30000000000000000000000000000000000001":
      name: "Demo Token"
      symbol: "DEMO"
      decimals: 18
      instrument_id: "DEMO"
    "0xC1A0000000000000000000000000000000000001":
      name: "USD Coin"
      symbol: "USDCx"
      decimals: 6
      instrument_id: "USDCx"
      external_transfer: true

eth_rpc:
  enabled: true
  chain_id: 1337
  request_timeout: "60s"

jwks:
  url: ""
  issuer: ""

monitoring:
  enabled: true
  server:
    host: "0.0.0.0"
    port: 9091
    read_timeout: "5s"
    write_timeout: "10s"
    idle_timeout: "30s"
    shutdown_timeout: "5s"
  health_check_url: "/health"

logging:
  level: "info"
  format: "json"
  output_path: "stdout"

key_management:
  master_key_env: "CANTON_MASTER_KEY"
  key_derivation: "generate"

skip_canton_sig_verify: false

# Admin API for whitelist management (POST/DELETE/GET /admin/whitelist).
# Enabled by ADMIN_API_ENABLED=true (default off); gated by a static bearer
# token supplied via ADMIN_API_KEY (required when enabled).
admin:
  enabled: ${ADMIN_API_ENABLED}
  api_key: "${ADMIN_API_KEY}"

cors:
  - "${CORS_ALLOWED_ORIGINS}"
