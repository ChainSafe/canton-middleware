# Local Indexer config for testing with DevNet Canton
server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

database:
  url: "${INDEXER_DATABASE_URL}"
  ssl_mode: "disable"
  timeout: 10
  pool_size: 10

canton_ledger:
  rpc_url: "canton-ledger-api-grpc-dev1.chainsafe.dev:80"
  ledger_id: ""
  max_inbound_message_size: 52428800
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    insecure_skip_verify: false
  auth:
    client_id: "${CANTON_AUTH_CLIENT_ID}"
    client_secret: "${CANTON_AUTH_CLIENT_SECRET}"
    audience: "https://canton-ledger-api-dev1.01.chainsafe.dev"
    token_url: "https://dev-2j3m40ajwym1zzaq.eu.auth0.com/oauth/token"
    expiry_leeway: "60s"

indexer:
  party: "${CANTON_ISSUER_PARTY}"
  cip56_package_id: "c8c6fe7c34d96b88d6471769aae85063c8045783b2a226fd24f8c573603d17c2"
  filter_mode: "all"

logging:
  level: "debug"
  format: "console"
  output_path: "stdout"
