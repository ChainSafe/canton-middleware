# =============================================================================
# Indexer Configuration (Docker / local)
# =============================================================================
# Used by the indexer container in docker-compose.yaml.
# Values marked ${...} are injected at runtime via environment variables.
# =============================================================================

server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

database:
  url: "${INDEXER_DATABASE_URL}"
  ssl_mode: "disable"
  timeout: 10
  pool_size: 10

canton_ledger:
  rpc_url: "canton:5011"
  ledger_id: ""
  max_inbound_message_size: 52428800
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    insecure_skip_verify: false
  auth:
    client_id: "${CANTON_AUTH_CLIENT_ID}"
    client_secret: "${CANTON_AUTH_CLIENT_SECRET}"
    audience: "http://canton:5011"
    token_url: "http://mock-oauth2:8088/oauth/token"
    expiry_leeway: "60s"

indexer:
  # Package-name references (#<name>) so filters match across all deployed
  # versions and work on real chains. Canton 3.x rejects raw package hashes
  # in stream filters with INVALID_FIELD; package names are the canonical form.
  cip56_package_id: "#cip56-token"
  filter_mode: "all"
  # utility_registry_app_v0 — required to track TransferOffer contracts
  # (Utility.Registry.App.V0.Model.Transfer.TransferOffer). Without this, the
  # indexer skips TransferOffer events and the api-server's accept worker has
  # nothing to poll, so cross-participant USDCx transfers never auto-accept.
  utility_registry_package_id: "#utility-registry-app-v0"
  # utility_registry_holding_v0 — required to update indexer_balances for
  # AllocationFactory-based instruments (e.g. USDCx). The indexer tracks
  # Holding contract creates/archives and applies the symmetric balance delta
  # for each owner.
  utility_registry_holding_package_id: "#utility-registry-holding-v0"

logging:
  level: "debug"
  format: "json"
  output_path: "stdout"
