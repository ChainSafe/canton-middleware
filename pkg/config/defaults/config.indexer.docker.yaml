# =============================================================================
# Indexer Configuration (Docker / local)
# =============================================================================
# Used by the indexer container in docker-compose.yaml.
# Values marked ${...} are injected at runtime via environment variables.
# =============================================================================

server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

database:
  url: "${INDEXER_DATABASE_URL}"
  ssl_mode: "disable"
  timeout: 10
  pool_size: 10

canton_ledger:
  rpc_url: "canton:5011"
  ledger_id: ""
  max_inbound_message_size: 52428800
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    insecure_skip_verify: false
  auth:
    client_id: "${CANTON_AUTH_CLIENT_ID}"
    client_secret: "${CANTON_AUTH_CLIENT_SECRET}"
    audience: "http://canton:5011"
    token_url: "http://mock-oauth2:8088/oauth/token"
    expiry_leeway: "60s"

indexer:
  cip56_package_id: "c8c6fe7c34d96b88d6471769aae85063c8045783b2a226fd24f8c573603d17c2"
  filter_mode: "all"
  # utility_registry_app_v0 package — required to track TransferOffer contracts
  # (Utility.Registry.App.V0.Model.Transfer.TransferOffer). Without this, the
  # indexer skips TransferOffer events and the api-server's accept worker has
  # nothing to poll, so cross-participant USDCx transfers never auto-accept.
  utility_registry_package_id: "7a75ef6e69f69395a4e60919e228528bb8f3881150ccfde3f31bcc73864b18ab"
  # utility_registry_holding_v0 package — required to update indexer_balances
  # for AllocationFactory-based instruments (e.g. USDCx). The indexer tracks
  # Holding contract creates/archives and applies the symmetric balance delta
  # for each owner.
  utility_registry_holding_package_id: "8107899ac4723ce986bf7d27416534e576e54b92161e46150a595fb78ff3d3a1"

logging:
  level: "debug"
  format: "json"
  output_path: "stdout"
