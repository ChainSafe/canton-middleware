# =============================================================================
# ERC-20 API Server Configuration (Docker)
# =============================================================================
# This config is used by the api-server container. Values are populated by
# the bootstrap script at runtime.
# =============================================================================

server:
  host: "0.0.0.0"
  port: 8081
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

database:
  url: "${API_SERVER_DATABASE_URL}"
  ssl_mode: "disable"
  timeout: 10
  pool_size: 10

canton:
  domain_id: "${CANTON_DOMAIN_ID}"  # Auto-detected by bootstrap
  issuer_party: "${CANTON_ISSUER_PARTY}"  # Auto-detected by bootstrap

  ledger:
    rpc_url: "canton:5011"
    ledger_id: ""
    max_inbound_message_size: 52428800
    tls:
      enabled: false
      cert_file: ""
      key_file: ""
      ca_file: ""
      insecure_skip_verify: false
    auth:
      client_id: "${CANTON_AUTH_CLIENT_ID}"
      client_secret: "${CANTON_AUTH_CLIENT_SECRET}"
      audience: "http://canton:5011"
      token_url: "http://mock-oauth2:8088/oauth/token"
      expiry_leeway: "60s"

  # Package-name references (#<name>) so filters match across all deployed
  # versions and work on real chains. Canton 3.x rejects raw package hashes
  # in stream filters with INVALID_FIELD; package names are the canonical form.
  identity:
    package_id: "#common"

  token:
    cip56_package_id: "#cip56-token"
    splice_transfer_package_id: "#splice-api-token-transfer-instruction-v1"
    splice_holding_package_id: "#splice-api-token-holding-v1"
    # Required so FindPendingInboundTransferInstructions can locate the
    # Utility.Registry.App.V0.Model.Transfer.TransferOffer template. Without it,
    # GET /api/v2/transfer/incoming returns "utility_registry_app_package_id not
    # configured" and external-key acceptors can't see their pending offers.
    utility_registry_app_package_id: "#utility-registry-app-v0"
    external_tokens:
      "${CANTON_USDCX_ISSUER_PARTY}":
        registry_url: "http://usdcx-registry:8090"

  bridge:
    package_id: "#bridge-wayfinder"
    core_package_id: "#bridge-core"
    module: "Wayfinder.Bridge"

token_provider:
  mode: indexer
  indexer:
    url: "http://indexer:8082"
    instruments:
      PROMPT: "${CANTON_ISSUER_PARTY}"
      DEMO:   "${CANTON_ISSUER_PARTY}"
      USDCx:  "${CANTON_USDCX_ISSUER_PARTY}"

# Token metadata
token:
  supported_tokens:
    "0x5FbDB2315678afecb367f032d93F642f64180aa3":
      name: "PROMPT"
      symbol: "PROMPT"
      decimals: 18
      instrument_id: "PROMPT"
    "0xDE30000000000000000000000000000000000001":
      name: "Demo Token"
      symbol: "DEMO"
      decimals: 18
      instrument_id: "DEMO"
    "0xC1A0000000000000000000000000000000000001":
      name: "USD Coin"
      symbol: "USDCx"
      decimals: 6
      instrument_id: "USDCx"
      external_transfer: true

# Ethereum JSON-RPC facade (MetaMask compatibility)
eth_rpc:
  enabled: true
  chain_id: 31337  # Anvil local chain ID
  request_timeout: "30s"

# Read-endpoint authentication (SIWE login + RS256 JWT). domain/uri/chain_id are
# localhost here so the e2e suite can sign a matching EIP-4361 message. The signing
# key is a base64-encoded PEM supplied via ${JWT_PRIVATE_KEY}.
auth:
  private_key: "${JWT_PRIVATE_KEY}"
  kid: "default"
  issuer: "canton-middleware"
  audience: "canton-middleware-api"
  token_ttl: "6h"
  nonce_ttl: "5m"
  domain: "localhost"
  uri: "http://localhost"
  chain_id: 31337

monitoring:
  enabled: true
  server:
    host: "0.0.0.0"
    port: 9091
    read_timeout: "5s"
    write_timeout: "10s"
    idle_timeout: "30s"
    shutdown_timeout: "5s"
  health_check_url: "/health"

logging:
  level: "debug"
  format: "json"
  output_path: "stdout"

# Auto-accepts pending TransferOffer contracts for custodial users by polling
# the indexer and exercising TransferInstruction_Accept on the api-server's
# behalf. Required for the e2e USDCx cross-participant test where the receiver
# is custodial and never explicitly calls the accept API.
accept_worker:
  indexer_url: "http://indexer:8082"
  poll_interval: "5s"

key_management:
  master_key_env: "CANTON_MASTER_KEY"
  key_derivation: "generate"

skip_canton_sig_verify: ${SKIP_CANTON_SIG_VERIFY}
skip_whitelist_check: false

# Admin API for whitelist management (POST/DELETE/GET /admin/whitelist).
# Enabled by ADMIN_API_ENABLED=true (default off); gated by a static bearer
# token supplied via ADMIN_API_KEY (required when enabled).
admin:
  enabled: ${ADMIN_API_ENABLED}
  api_key: "${ADMIN_API_KEY}"

cors:
  - "*"
