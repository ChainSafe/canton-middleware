# Docker Compose override for Mainnet
# Usage: docker compose -f docker-compose.yaml -f docker-compose.mainnet.yaml up -d
#
# This overlay:
# - Disables local Canton, Anvil, deployer (using mainnet services)
# - Disables mock-oauth2 and bootstrap (not needed for mainnet)
# - Keeps Postgres for relayer state
# - Uses ENV=docker (built-in defaults in image)

services:
  # Disable local services - using mainnet
  canton:
    profiles: ["disabled"]

  anvil:
    profiles: ["disabled"]

  deployer:
    profiles: ["disabled"]

  mock-oauth2:
    profiles: ["disabled"]

  bootstrap:
    profiles: ["disabled"]

  api-server:
    profiles: ["disabled"]

  relayer:
    depends_on: !override
      postgres:
        condition: service_healthy
    volumes: []
    command: []
    environment:
      ENV: docker

  # Postgres stays enabled for relayer state
