name: Lint E2E

on:
  pull_request:
    paths:
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-e2e:
    name: PR Lint (E2E)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run golangci-lint for E2E tests
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.9.0
          args: --timeout=5m --build-tags e2e ./tests/e2e/...