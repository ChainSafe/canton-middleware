name: E2E Tests

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate CANTON_MASTER_KEY
        run: echo "CANTON_MASTER_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: make test-e2e

      - name: Stop devstack
        if: always()
        run: make devstack-down
