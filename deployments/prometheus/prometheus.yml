global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'canton-bridge-relayer'
    static_configs:
      - targets: ['relayer:9090']
        labels:
          service: 'relayer'

  - job_name: 'canton-api-server'
    static_configs:
      - targets: ['api-server:9091']
        labels:
          service: 'api-server'

  - job_name: 'canton-indexer'
    static_configs:
      - targets: ['indexer:9092']
        labels:
          service: 'indexer'
